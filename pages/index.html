<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de vendas</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/3976/3976419.png" type="image/x-icon">
    <link rel="stylesheet" href="../style/index.css">
</head>
<body>
    <section id="card">
        <h2>Calculadora de Vendas</h2>
        <form id="calc-form">
            <label for="preco">Preço do Produto (R$):</label>
            <input type="number" id="preco" step="0.01" placeholder="Ex:150.00">

            <label for="taxa">Taxa do site (%):</label>
            <input type="number" id="taxa" step="0.05" placeholder="Ex: 12">

            <label for="descontoReais">Desconto adicional (R$):</label>
            <input type="number" id="descontoReais" step="0.01" placeholder="Ex: 20.00">

            <button type="button" onclick="calcular()">Calcular</button>
        </form>
    </section>
    <section id="resultado" class="hidden">
        <p>Valor da taxa: <span id="out-taxa"></span></p>
        <p>Lucro final: <strong id="out-lucro"></strong></p>
    </section>
    <script src="../scripts/index.js"></script>
</body>
</html>
